<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>God</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
background:#fff;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

#wrap{
display:flex;
flex-direction:column;
align-items:center;
}

#god{
width:220px;
transition:.1s transform,5s opacity;
pointer-events:none;
user-select:none;
}

.talking{
transform:scale(1.03);
}

button{
margin-top:35px;
width:60px;
height:18px;
background:#111;
border:none;
border-radius:3px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.fade{
opacity:0;
}
</style>
</head>

<body>

<div id="wrap">

<img id="god"
src="https://i.ibb.co/mVqcsNh2/20260619-185410.gif">

<button id="listen"></button>

</div>

<audio id="voice" preload="auto">
<source src="https://met-lu.vercel.app/God.mp3" type="audio/mpeg">
</audio>

<script>

const button=document.getElementById("listen");
const god=document.getElementById("god");
const voice=document.getElementById("voice");

button.onclick=async()=>{

button.disabled=true;

await new Promise(r=>setTimeout(r,4000));

god.classList.add("talking");

voice.play();

voice.onended=()=>{

god.classList.remove("talking");

god.classList.add("fade");

button.classList.add("fade");

};

};

</script>

</body>
</html>
